<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3DA67D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="食记" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>食记 · 营养健身管家</title>
  <style>
    html, body, #root { margin: 0; min-height: 100%; background: #F4F9F6; }
    #boot, #login {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      background: #F4F9F6; color: #6B7A72; font: 14px/1.6 Inter, system-ui, sans-serif;
    }
    #login { display: none; }
    #login.open { display: flex; }
    .loginBox {
      background: #fff; border-radius: 22px; padding: 30px 26px; max-width: 380px; width: 100%;
      box-shadow: 0 12px 40px rgba(28,43,36,.12); text-align: center;
    }
    .loginBox h1 { margin: 0 0 4px; font-size: 26px; color: #1C2B24; font-family: "Playfair Display","Noto Serif SC",serif; }
    .loginBox .sub { margin: 0 0 22px; font-size: 13px; color: #6B7A72; }
    .loginBox label { display: block; text-align: left; font-size: 12px; color: #6B7A72; margin: 0 0 6px; }
    .loginBox input {
      width: 100%; box-sizing: border-box; padding: 13px 15px; border-radius: 13px;
      border: 1px solid #EDF1EE; font-size: 15px; outline: none;
    }
    .loginBox button {
      width: 100%; padding: 13px; border: none; border-radius: 14px; margin-top: 14px;
      background: #3DA67D; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .loginBox button:disabled { opacity: .6; cursor: default; }
    .loginBox .msg { margin-top: 14px; font-size: 13px; color: #2E8B68; line-height: 1.5; }
    .loginBox .err { color: #C8694E; }
    .loginBox .otpRow { margin-top: 14px; }
    .loginBox .otpRow label { margin-top: 0; }
    .loginBox .otpInput {
      text-align: center; font-size: 22px; letter-spacing: 6px; font-weight: 600;
    }
    .loginBox .hint { margin-top: 10px; font-size: 12px; color: #9AA8A0; line-height: 1.5; text-align: left; }
  </style>
</head>
<body>
  <div id="boot">正在加载食记…</div>
  <div id="login">
    <div class="loginBox">
      <h1>食记</h1>
      <p class="sub">营养健身管家 · 邮箱验证码登录（公司网络也能用）</p>
      <label>邮箱</label>
      <input id="email" type="email" placeholder="cjiawen719@gmail.com" autocomplete="email" />
      <button id="sendLink" type="button">发送验证码</button>
      <div id="otpRow" class="otpRow" style="display:none">
        <label>6 位验证码（看邮件正文，不是点链接）</label>
        <input id="otp" class="otpInput" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code" />
        <button id="verifyOtp" type="button">登录</button>
      </div>
      <div id="loginMsg" class="msg"></div>
      <p class="hint">公司电脑若拦截邮件链接，请<strong>只看邮件里的数字验证码</strong>填上面。用手机 4G 打开链接也可以。</p>
    </div>
  </div>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/dist/app.js?v=mqssuctx" defer></script>
  <script>
    const bootEl = document.getElementById("boot");
    const loginEl = document.getElementById("login");
    const emailEl = document.getElementById("email");
    const sendBtn = document.getElementById("sendLink");
    const otpRow = document.getElementById("otpRow");
    const otpEl = document.getElementById("otp");
    const verifyBtn = document.getElementById("verifyOtp");
    const loginMsg = document.getElementById("loginMsg");
    let sb = null;
    let uid = null;

    function showLogin(msg, isErr) {
      bootEl.style.display = "none";
      loginEl.classList.add("open");
      if (msg) { loginMsg.textContent = msg; loginMsg.className = "msg" + (isErr ? " err" : ""); }
    }

    // 令牌提供给 fitness_coach.jsx 调用受保护的 /api/llm-proxy
    window.__AUTH_PROXY = true;
    window.__getToken = async () => {
      if (!sb) return null;
      const { data } = await sb.auth.getSession();
      return (data.session && data.session.access_token) || null;
    };

    // 云端同步存储：coach-data 存到 Supabase；其余仍用 localStorage
    window.storage = {
      async get(key) {
        if (key !== "coach-data") {
          const v = localStorage.getItem("hc:" + key);
          return v != null ? { value: v } : null;
        }
        try {
          const { data, error } = await sb.from("user_state").select("data").eq("user_id", uid).maybeSingle();
          if (!error && data && data.data && Object.keys(data.data).length) {
            const s = JSON.stringify(data.data);
            localStorage.setItem("hc:coach-data", s);
            return { value: s };
          }
        } catch (_) {}
        // 云端还没有数据：回落到本地缓存（首次登录可把本机已有记录带上去）
        const v = localStorage.getItem("hc:coach-data");
        return v != null ? { value: v } : null;
      },
      async set(key, val) {
        if (key !== "coach-data") { localStorage.setItem("hc:" + key, val); return; }
        localStorage.setItem("hc:coach-data", val);
        try {
          await sb.from("user_state").upsert({ user_id: uid, data: JSON.parse(val), updated_at: new Date().toISOString() });
        } catch (_) {}
      },
    };

    async function startApp() {
      bootEl.style.display = "flex";
      bootEl.textContent = "正在加载食记…";
      loginEl.classList.remove("open");
      // 等待预编译 bundle（构建时 esbuild 打包，手机不再现场编译 JSX）
      for (let i = 0; i < 80 && !window.__mountApp; i++) {
        await new Promise((r) => setTimeout(r, 50));
      }
      if (!window.__App || !window.__mountApp) throw new Error("应用脚本未加载，请刷新或清除缓存后重试");
      bootEl.remove();
      window.__mountApp(document.getElementById("root"));
    }

    sendBtn.onclick = async () => {
      const email = (emailEl.value || "").trim();
      if (!email) { loginMsg.textContent = "请输入邮箱"; loginMsg.className = "msg err"; return; }
      sendBtn.disabled = true; loginMsg.textContent = "发送中…"; loginMsg.className = "msg";
      try {
        const { error } = await sb.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: window.location.origin, shouldCreateUser: true },
        });
        if (error) throw error;
        otpRow.style.display = "block";
        otpEl.focus();
        loginMsg.textContent = "验证码已发到邮箱。请打开邮件找 6 位数字（不要点链接，公司网络会拦）。";
        loginMsg.className = "msg";
      } catch (e) {
        loginMsg.textContent = "发送失败：" + (e.message || e);
        loginMsg.className = "msg err";
      } finally {
        sendBtn.disabled = false;
      }
    };

    verifyBtn.onclick = async () => {
      const email = (emailEl.value || "").trim();
      const token = (otpEl.value || "").trim().replace(/\s/g, "");
      if (!email) { loginMsg.textContent = "请输入邮箱"; loginMsg.className = "msg err"; return; }
      if (!/^\d{6}$/.test(token)) { loginMsg.textContent = "请输入邮件里的 6 位数字验证码"; loginMsg.className = "msg err"; return; }
      verifyBtn.disabled = true; loginMsg.textContent = "验证中…"; loginMsg.className = "msg";
      try {
        const { error } = await sb.auth.verifyOtp({ email, token, type: "email" });
        if (error) throw error;
        loginMsg.textContent = "登录成功，正在进入…";
        loginMsg.className = "msg";
      } catch (e) {
        loginMsg.textContent = "验证失败：" + (e.message || e) + "（验证码 10 分钟内有效，可重新发送）";
        loginMsg.className = "msg err";
      } finally {
        verifyBtn.disabled = false;
      }
    };

    (async function boot() {
      try {
        const cfg = await (await fetch("/api/config", { cache: "no-store" })).json();
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
          showLogin("服务端未配置 Supabase（请在 Vercel 设置 SUPABASE_URL / SUPABASE_ANON_KEY）", true);
          return;
        }
        sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
          auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true },
        });
        sb.auth.onAuthStateChange((_event, session) => {
          if (session && session.user && !window.__APP_STARTED) {
            window.__APP_STARTED = true;
            uid = session.user.id;
            startApp().catch(onStartFail);
          }
        });
        const { data } = await sb.auth.getSession();
        if (data.session && data.session.user) {
          window.__APP_STARTED = true;
          uid = data.session.user.id;
          await startApp().catch(onStartFail);
        } else {
          showLogin();
        }
      } catch (e) {
        showLogin("初始化失败：" + (e.message || e), true);
      }
    })();

    async function onStartFail(e) {
      const msg = String(e && e.message || e);
      if (/Babel/i.test(msg) && !sessionStorage.getItem("hc:babel-reset")) {
        sessionStorage.setItem("hc:babel-reset", "1");
        try {
          if ("serviceWorker" in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
        } catch (_) {}
        location.reload();
        return;
      }
      bootEl.style.display = "flex";
      bootEl.textContent = "加载失败：" + msg + "（可尝试清除浏览器缓存后刷新）";
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
